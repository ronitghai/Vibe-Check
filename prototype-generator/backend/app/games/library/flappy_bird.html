<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flappy Bird</title>
<style>
  .wrap { text-align: center; }
  .game-title { margin-bottom: 8px; }
  #hint { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  canvas { background: var(--surface); border-radius: var(--radius); display: block; cursor: pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <h1 class="game-title">Flappy Bird</h1>
    <div id="hint">Click, tap, or press Space to flap</div>
    <canvas id="c" width="360" height="480"></canvas>
  </div>

<script>
(function () {
  var CONFIG = window.__CONFIG__ || {};
  var difficulty = CONFIG.difficulty || "medium";

  var settings = {
    easy:   { gravity: 0.32, flap: -6.4, gap: 150, speed: 2.2, spawn: 105 },
    medium: { gravity: 0.4,  flap: -7.2, gap: 130, speed: 2.8, spawn: 90 },
    hard:   { gravity: 0.48, flap: -7.6, gap: 112, speed: 3.4, spawn: 78 }
  }[difficulty] || settings_medium();
  function settings_medium() {
    return { gravity: 0.4, flap: -7.2, gap: 130, speed: 2.8, spawn: 90 };
  }

  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var W = canvas.width, H = canvas.height;
  var PIPE_W = 52;

  var rootStyle = getComputedStyle(document.documentElement);
  function themeColor(name) { return rootStyle.getPropertyValue(name).trim(); }
  var COLORS = {
    accent: themeColor("--accent"),
    success: themeColor("--success"),
    warning: themeColor("--warning"),
    text: themeColor("--text"),
    bg: themeColor("--bg")
  };

  var bird, pipes, frame, score, best, over, started;

  function reset() {
    bird = { x: 70, y: H / 2, vy: 0, r: 12 };
    pipes = [];
    frame = 0;
    score = 0;
    over = false;
    started = false;
  }

  function spawnPipe() {
    var margin = 40;
    var top = margin + Math.random() * (H - settings.gap - margin * 2);
    pipes.push({ x: W + PIPE_W, top: top, passed: false });
  }

  function update() {
    if (!started || over) return;

    bird.vy += settings.gravity;
    bird.y += bird.vy;

    frame++;
    if (frame % settings.spawn === 0) spawnPipe();

    for (var i = pipes.length - 1; i >= 0; i--) {
      var p = pipes[i];
      p.x -= settings.speed;

      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true;
        score++;
      }
      if (p.x < -PIPE_W) pipes.splice(i, 1);

      var hitX = bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W;
      var hitY = bird.y - bird.r < p.top || bird.y + bird.r > p.top + settings.gap;
      if (hitX && hitY) gameOver();
    }

    if (bird.y + bird.r > H || bird.y - bird.r < 0) gameOver();
  }

  function gameOver() {
    over = true;
    best = Math.max(best || 0, score);
  }

  function flap() {
    if (over) { reset(); return; }
    started = true;
    bird.vy = settings.flap;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = COLORS.accent;
    ctx.globalAlpha = 0.15;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;

    ctx.fillStyle = COLORS.success;
    pipes.forEach(function (p) {
      ctx.fillRect(p.x, 0, PIPE_W, p.top);
      ctx.fillRect(p.x, p.top + settings.gap, PIPE_W, H - p.top - settings.gap);
    });

    ctx.fillStyle = COLORS.warning;
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = COLORS.text;
    ctx.font = "bold 22px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(String(score), W / 2, 40);

    if (!started) {
      ctx.font = "14px system-ui, sans-serif";
      ctx.fillText("Click to start", W / 2, H / 2);
    }
    if (over) {
      ctx.fillStyle = "rgba(15,23,42,0.75)";
      ctx.fillRect(0, H / 2 - 50, W, 100);
      ctx.fillStyle = COLORS.text;
      ctx.font = "bold 20px system-ui, sans-serif";
      ctx.fillText("Game Over", W / 2, H / 2 - 12);
      ctx.font = "14px system-ui, sans-serif";
      ctx.fillText("Score " + score + "  •  Best " + best, W / 2, H / 2 + 12);
      ctx.fillText("Click to play again", W / 2, H / 2 + 34);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener("click", flap);
  document.addEventListener("keydown", function (e) {
    if (e.code === "Space") { e.preventDefault(); flap(); }
  });

  reset();
  loop();
})();
</script>
</body>
</html>
